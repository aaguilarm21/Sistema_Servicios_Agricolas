<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/modulos.css' %}" />
</head>
<body>
  <h1>Bienvenido, {{ request.user.username }}!</h1>
  <p>Has iniciado sesión correctamente.</p>
  <p><a href="{% url 'modulos' %}">Ir a Módulos</a></p>
  <form action="{% url 'logout' %}" method="post" class="inline-form">
    {% csrf_token %}
    <button type="submit" class="link-button">Cerrar sesión</button>
  </form>
</body>
</html>
